<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#f8f6f2;--pale:#1a1520;--silver:#6b6578}
body{font-family:'Noto Serif SC',serif;background:transparent;padding:5px}
.ss{width:100%;max-width:360px;margin:0 auto}

/* 第一层封面 */
.lc{display:flex;justify-content:center;perspective:1500px}
.lc.flip .cc{transform:rotateY(180deg)}
.cc{width:300px;height:420px;position:relative;transform-style:preserve-3d;transition:transform 1s cubic-bezier(0.4,0,0.2,1);cursor:pointer}
.cf{position:absolute;width:100%;height:100%;backface-visibility:hidden;background:linear-gradient(180deg,#f0ece6,#faf8f5 50%,#f0ece6);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 20px 60px rgba(0,0,0,0.08);animation:breathe 4s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:translateY(0);box-shadow:0 20px 60px rgba(0,0,0,0.08)}50%{transform:translateY(-5px);box-shadow:0 28px 80px rgba(0,0,0,0.1),0 0 60px rgba(80,60,50,0.08)}}
.cf::before{content:'';position:absolute;inset:10px;border:2px solid rgba(80,60,50,0.2);animation:borderBreath 4s ease-in-out infinite}
@keyframes borderBreath{0%,100%{border-color:rgba(80,60,50,0.2)}50%{border-color:rgba(80,60,50,0.3)}}
.cf::after{content:'';position:absolute;inset:18px;border:1px solid rgba(80,60,50,0.12)}
.ec{position:absolute;width:40px;height:40px}
.ec svg{width:100%;height:100%;fill:none;stroke:rgba(80,60,50,0.25);stroke-width:1}
.ec.tl{top:6px;left:6px}.ec.tr{top:6px;right:6px;transform:scaleX(-1)}.ec.bl{bottom:6px;left:6px;transform:scaleY(-1)}.ec.br{bottom:6px;right:6px;transform:scale(-1)}
.ctd{position:absolute;top:28px;display:flex;align-items:center;gap:10px}
.dl{width:30px;height:1px;background:linear-gradient(90deg,transparent,rgba(80,60,50,0.3),transparent)}
.dd{width:6px;height:6px;border:1px solid rgba(80,60,50,0.35);transform:rotate(45deg)}
.ct{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:600;color:var(--pale);letter-spacing:8px;margin-bottom:14px;animation:textGlow 4s ease-in-out infinite}
@keyframes textGlow{0%,100%{text-shadow:0 4px 15px rgba(0,0,0,0.06);opacity:0.95}50%{text-shadow:0 4px 20px rgba(0,0,0,0.06),0 0 30px rgba(80,60,50,0.1);opacity:1}}
.cs{font-family:'Cormorant Garamond',serif;font-size:11px;color:var(--silver);letter-spacing:5px;text-transform:uppercase;display:flex;align-items:center;gap:8px;margin-bottom:45px}
.sd{width:20px;height:1px;background:rgba(80,60,50,0.3)}
.ch{position:absolute;bottom:55px;font-family:'Cormorant Garamond',serif;font-size:10px;color:rgba(80,60,50,0.4);letter-spacing:3px;animation:hintPulse 2.5s ease-in-out infinite}
@keyframes hintPulse{0%,100%{opacity:0.4}50%{opacity:1}}
.cbd{position:absolute;bottom:25px;display:flex;gap:6px}
.bo{font-size:10px;color:rgba(80,60,50,0.3)}
.cbk{position:absolute;width:100%;height:100%;backface-visibility:hidden;transform:rotateY(180deg)}

/* 第二层轮播 */
.cw{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 0}
.cst{position:relative;width:100%;height:340px;display:flex;align-items:center;justify-content:center}
.chc{position:absolute;width:220px;height:310px;cursor:pointer;transition:all 0.6s cubic-bezier(0.4,0,0.2,1)}
.chc.cen{z-index:10;transform:translateX(0) scale(1);opacity:1}
.chc.lef{z-index:5;transform:translateX(-50%) scale(0.65) rotateY(12deg);opacity:0.3;filter:brightness(0.4)}
.chc.rig{z-index:5;transform:translateX(50%) scale(0.65) rotateY(-12deg);opacity:0.3;filter:brightness(0.4)}
.chc.hid{opacity:0;pointer-events:none;transform:scale(0.5)}
.chf{width:100%;height:100%;background:linear-gradient(180deg,#f5f2ed,#faf8f5 50%,#f5f2ed);position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;border:2px solid var(--char-color,#6b4a52);box-shadow:0 10px 40px rgba(0,0,0,0.06),0 0 30px var(--char-glow,rgba(107,74,82,0.3));transition:all 0.4s}
.chc.cen .chf{animation:cardBreath 4s ease-in-out infinite}
@keyframes cardBreath{0%,100%{box-shadow:0 10px 40px rgba(0,0,0,0.06),0 0 30px var(--char-glow)}50%{box-shadow:0 15px 50px rgba(0,0,0,0.08),0 0 50px var(--char-glow)}}
.chf::before{content:'';position:absolute;inset:6px;border:1px solid rgba(80,60,50,0.12)}
.af{width:130px;height:170px;position:relative;margin-bottom:14px}
.ab{position:absolute;inset:0}
.ab svg{width:100%;height:100%;fill:none;stroke:var(--char-color,#6b4a52);stroke-width:2}
.ai{position:absolute;inset:6px;overflow:hidden;background:var(--bg)}
.ai img{width:100%;height:100%;object-fit:cover;object-position:center top}
.ai:empty{background:linear-gradient(135deg,#ece8e2,#f5f2ed);display:flex;align-items:center;justify-content:center}.ai:empty::after{content:'◈';font-size:36px;color:var(--char-color,#6b4a52);opacity:0.3}
.cna{text-align:center}
.cnc{font-size:18px;font-weight:600;color:var(--pale);letter-spacing:4px;margin-bottom:4px}
.chc.cen .cnc{animation:textGlow 4s ease-in-out infinite}
.cti{font-size:8px;color:var(--silver);letter-spacing:1px;opacity:0.7}
.th{position:absolute;bottom:12px;font-family:'Cormorant Garamond',serif;font-size:8px;color:var(--silver);letter-spacing:2px;opacity:0}
.chc.cen .th{opacity:1;animation:hintPulse 2.5s ease-in-out infinite}
.cn{display:flex;justify-content:center;gap:12px;margin-top:10px}
.nd{width:6px;height:6px;border:1px solid var(--silver);transform:rotate(45deg);cursor:pointer;opacity:0.4;transition:all 0.3s}
.nd.act{background:var(--pale);border-color:var(--pale);opacity:1}
.bt{margin-top:12px;font-family:'Cormorant Garamond',serif;font-size:9px;color:var(--silver);letter-spacing:2px;cursor:pointer;opacity:0.6}

/* 第三层详情 */
.ld{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(240,236,230,0.97);z-index:1000;display:none;overflow-y:auto;padding:12px;align-items:center;justify-content:center}
.ld.act{display:flex}
.dp{width:100%;max-width:400px;background:linear-gradient(180deg,#f2efe8,#faf8f5 50%,#f2efe8);position:relative;border:2px solid var(--char-color,#6b4a52);box-shadow:0 0 60px var(--char-glow,rgba(107,74,82,0.3));animation:panelIn 0.4s ease}
@keyframes panelIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
.dp::before{content:'';position:absolute;inset:5px;border:1px solid rgba(80,60,50,0.08)}
.ds{padding:18px;max-height:85vh;overflow-y:auto}
.ds::-webkit-scrollbar{width:3px}
.ds::-webkit-scrollbar-thumb{background:rgba(80,60,50,0.2)}
.dh{display:flex;gap:14px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid rgba(80,60,50,0.12)}
.ha{width:90px;height:120px;flex-shrink:0;position:relative}
.hab{position:absolute;inset:0}
.hab svg{width:100%;height:100%;fill:none;stroke:var(--char-color,#6b4a52);stroke-width:2}
.hai{position:absolute;inset:4px;overflow:hidden;background:var(--bg)}
.hai img{width:100%;height:100%;object-fit:cover;object-position:center top}
.hai:empty{background:linear-gradient(135deg,#ece8e2,#f5f2ed);display:flex;align-items:center;justify-content:center}.hai:empty::after{content:'◈';font-size:24px;color:var(--char-color,#6b4a52);opacity:0.3}
.hi{flex:1;display:flex;flex-direction:column;justify-content:space-between}
.ii{margin-bottom:8px}
.dnc{font-size:22px;font-weight:700;color:var(--pale);letter-spacing:3px;margin-bottom:2px}
.dr{font-size:9px;color:var(--char-accent,#a08090);letter-spacing:1px;opacity:0.9}
.ps{display:flex;align-items:center;gap:8px}
.pi{font-size:16px;color:var(--char-color,#6b4a52)}
.pi.nor{animation:heartNor 1s infinite}
.pi.str{animation:heartStr 0.55s infinite;color:var(--char-dark,#4a3040)}
@keyframes heartNor{0%,100%{transform:scale(1)}15%,40%{transform:scale(1.15)}30%,55%{transform:scale(1)}}
@keyframes heartStr{0%,100%{transform:scale(1)}10%,30%{transform:scale(1.4)}20%,40%{transform:scale(1)}50%,70%{transform:scale(1.35)}60%,80%{transform:scale(1)}}
.pn{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--pale)}
.pu{font-size:8px;color:var(--silver);margin-left:1px}
.eb{flex:1;height:28px;margin-left:6px;overflow:hidden;position:relative}
.ew{position:absolute;width:200%;height:100%;display:flex}
.ew.nor{animation:ecgNor 2.2s linear infinite}
.ew.fas{animation:ecgFas 1.1s linear infinite}
@keyframes ecgNor{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes ecgFas{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ew svg{height:100%;width:50%;flex-shrink:0}
.ew path{fill:none;stroke:var(--char-accent,#a08090);stroke-width:2;filter:drop-shadow(0 0 3px var(--char-glow))}
.ib{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid rgba(80,60,50,0.08)}
.it{display:flex;align-items:center;gap:5px;padding:5px 8px;background:rgba(80,60,50,0.04);font-size:9px;border-left:2px solid var(--char-color,#6b4a52)}
.tl{font-family:'Cormorant Garamond',serif;color:var(--silver);letter-spacing:1px}
.tv{color:var(--pale)}
.os{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid rgba(80,60,50,0.08)}
.sl{font-family:'Cormorant Garamond',serif;font-size:9px;color:var(--char-accent,#a08090);letter-spacing:2px;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.sl::before{content:'◈';font-size:6px}
.ot{font-size:11px;color:var(--pale);line-height:1.7;opacity:0.9}
.dc{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.tc{background:rgba(80,60,50,0.03);padding:10px;border-top:2px solid var(--char-color,#6b4a52)}
.clt{font-family:'Cormorant Garamond',serif;font-size:8px;color:var(--char-accent,#a08090);letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:3px}
.clt::before{content:'♦';font-size:5px}
.txt{font-size:10px;color:var(--pale);line-height:1.75;font-style:italic;opacity:0.9}
.fc{background:rgba(90,30,50,0.04);padding:10px;cursor:pointer;border-top:2px solid var(--char-dark,#4a3040)}
.flk{text-align:center;padding:15px 0}
.ls{font-size:18px;color:var(--char-color,#6b4a52);margin-bottom:4px;animation:lockGlow 3s ease-in-out infinite}
@keyframes lockGlow{0%,100%{opacity:0.6}50%{opacity:1;text-shadow:0 0 8px currentColor}}
.lh{font-family:'Cormorant Garamond',serif;font-size:8px;color:var(--silver);letter-spacing:1px}
.fr{display:none;animation:fadeIn 0.4s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fc.op .flk{display:none}
.fc.op .fr{display:block}
.ftx{font-size:10px;color:var(--char-accent,#a08090);line-height:1.75}
.ftg{display:flex;align-items:center;gap:4px;margin-top:8px;padding-top:6px;border-top:1px solid rgba(80,60,50,0.08)}
.fti{font-size:8px;color:var(--char-color,#6b4a52)}
.ftt{font-family:'Cormorant Garamond',serif;font-size:7px;color:var(--silver);letter-spacing:1px}
.df{text-align:center;padding-top:10px}
.rt{font-family:'Cormorant Garamond',serif;font-size:10px;color:var(--silver);letter-spacing:2px;cursor:pointer;opacity:0.7;display:inline-flex;align-items:center;gap:6px}
.rt::before,.rt::after{content:'◈';font-size:5px}
@media(max-width:380px){.dp{max-width:100%}.dc{grid-template-columns:1fr}}
</style>
</head>
<body>
<!-- disable-default-loading -->
<div class="ss">
<div class="lc" id="lc">
<div class="cc" id="cc">
<div class="cf">
<div class="ec tl"><svg viewBox="0 0 50 50"><path d="M5,5 L5,25 M5,5 L25,5"/></svg></div>
<div class="ec tr"><svg viewBox="0 0 50 50"><path d="M5,5 L5,25 M5,5 L25,5"/></svg></div>
<div class="ec bl"><svg viewBox="0 0 50 50"><path d="M5,5 L5,25 M5,5 L25,5"/></svg></div>
<div class="ec br"><svg viewBox="0 0 50 50"><path d="M5,5 L5,25 M5,5 L25,5"/></svg></div>
<div class="ctd"><span class="dl"></span><span class="dd"></span><span class="dl"></span></div>
<div class="ct">Dossier</div>
<div class="cs"><span class="sd"></span><span>Archives</span><span class="sd"></span></div>
<div class="ch">Click to Enter</div>
<div class="cbd"><span class="bo">◈</span><span class="bo">◈</span><span class="bo">◈</span></div>
</div>
<div class="cbk">
<div class="cw">
<div class="cst" id="car"></div>
<div class="cn" id="dots"></div>
<div class="bt" id="btc">Return</div>
</div>
</div>
</div>
</div>
<div class="ld" id="ld"></div>
</div>
<script>
(function(){
var avatars={};
var themes={
'沈知行':{c:'#4a7c9b',d:'#2d5a73',a:'#8bb8d4',g:'rgba(74,124,155,0.4)'},
'程屿洲':{c:'#8b2942',d:'#5c1a2d',a:'#c94c6d',g:'rgba(139,41,66,0.4)'},
'顾辰野':{c:'#8b6914',d:'#5c4510',a:'#d4a84b',g:'rgba(139,105,20,0.4)'},
'傅时予':{c:'#2d6b4f',d:'#1a4532',a:'#5cb88a',g:'rgba(45,107,79,0.4)'},
'陆景琛':{c:'#b8860b',d:'#8b6508',a:'#ffd700',g:'rgba(184,134,11,0.4)'},
'沈珩':{c:'#6b5b95',d:'#4a3d6b',a:'#9b8bc4',g:'rgba(107,91,149,0.4)'},
'沈慕白':{c:'#708090',d:'#4a5560',a:'#a8b8c8',g:'rgba(112,128,144,0.4)'},
'苏景行':{c:'#8b4513',d:'#5c2d0e',a:'#cd853f',g:'rgba(139,69,19,0.4)'}
};
var defTheme={c:'#6b4a52',d:'#4a3040',a:'#a08090',g:'rgba(107,74,82,0.3)'};

var rawData=['沈知行|政商世家·长子|22:15|顶层私人会所|城市夜景璀璨|深灰三件套西装，袖扣是低调的黑玛瑙，手指轻转着威士忌杯，目光越过落地窗俯瞰整座城市的灯火|72|false|会议上她的提案被驳回时，我注意到她握笔的手指微微发白。她从不在人前示弱，可我偏偏总能看见。|想松开她紧攥的手，想把她拉进怀里说「不必逞强」。想看她卸下所有盔甲后的样子，哪怕只有一瞬。','程屿洲|金融新贵·基金经理|21:40|外滩私人车库|小雨|黑色高领毛衣，外搭深驼色大衣，靠在迈凯伦车门上翻看手机，屏幕光映出他微蹙的眉|88|true|她已读不回。第三次了。我可以让一支股票涨停，却连一条回复都等不到。这种失控感让我发疯。|想开车去她楼下，想按住她的肩膀质问她为什么躲我。想吻掉她嘴边那句「我们不合适」，想让她承认心跳加速的不只是我。','顾辰野|军区特种兵·退役|21:00|拳击馆|馆外飘雪|黑色背心被汗浸透，手上缠着绷带，刚结束三小时的沙袋训练，肩胛骨上的旧伤疤在灯光下若隐若现|62|false|教官说我出拳带情绪。我没反驳。六个月了，每次握拳都会想起那天她在雨里追出来喊我名字的样子。|想回头。想接住她所有的眼泪。想用这双只会握枪的手，学会温柔地抱她。想告诉她，我不是不要她，是怕连累她。','陆景琛|娱乐帝国·CEO|22:30|录音室控制台前|落地窗外万家灯火|白衬衫卷至小臂，领口解开两颗扣子，耳挂监听耳机，指尖在调音台上缓慢滑动，表情专注而疏离|95|true|这首歌的demo是她离开前留下的。每一个音符都在提醒我——我拥有整个娱乐帝国，却留不住一个人。|想锁上录音室的门，想让全世界都消失。想听她再唱一次这首歌，想在副歌部分把她抱进怀里，让心跳替代节拍器。','傅时予|学术天才·神经外科医生|23:00|医院天台|夜空澄净|白大褂未脱，胸口别着ID卡，手里夹着没点燃的烟，仰头望着星空，手术后的疲惫藏在镜片后的眼睛里|68|false|今天的手术很成功，十二小时，零失误。可走出手术室的那一刻，我第一个想告诉的人，号码却已经从通讯录删除了。|想重新存下那个号码。想发一条消息说「今天救了一个人，突然很想你」。想摘下手套，用做了一天精密手术的手，笨拙地为她擦掉眼角的泪。'];
var chars=[];
rawData.forEach(function(r){if(r&&r.indexOf('|')>-1){var p=r.split('|');if(p.length>=10)chars.push({name:p[0],identity:p[1],time:p[2],location:p[3],weather:p[4],action:p[5],bpm:parseInt(p[6])||70,stress:p[7]==='true',pensee:p[8],desir:p[9]});}});

var cur=0,car=document.getElementById('car'),dots=document.getElementById('dots'),ld=document.getElementById('ld');

function getTheme(n){return themes[n]||defTheme;}
function getAvatar(n){return avatars[n]||'';}

function buildCards(){
car.innerHTML='';dots.innerHTML='';ld.innerHTML='';
chars.forEach(function(ch,i){
var t=getTheme(ch.name),av=getAvatar(ch.name);
var card=document.createElement('div');
card.className='chc'+(i===0?' cen':i===1?' rig':i===2?' lef':' hid');
card.dataset.index=i;
card.style.setProperty('--char-color',t.c);
card.style.setProperty('--char-glow',t.g);
card.innerHTML='<div class="chf"><div class="af"><div class="ab"><svg viewBox="0 0 130 170"><rect x="1" y="1" width="128" height="168" rx="3"/><rect x="4" y="4" width="122" height="162" rx="2" stroke-opacity="0.3"/></svg></div><div class="ai">'+(av?'<img src="'+av+'" alt="'+ch.name+'">':'')+'</div></div><div class="cna"><div class="cnc">'+ch.name+'</div><div class="cti">'+ch.identity+'</div></div><span class="th">Tap for Details</span></div>';
card.onclick=function(e){e.stopPropagation();if(card.classList.contains('cen')){showDetail(i);}else{cur=i;updateCarousel();}};
car.appendChild(card);

var dot=document.createElement('div');
dot.className='nd'+(i===0?' act':'');
dot.dataset.index=i;
dot.onclick=function(e){e.stopPropagation();cur=i;updateCarousel();};
dots.appendChild(dot);

var panel=document.createElement('div');
panel.className='dp';
panel.dataset.detail=i;
panel.style.display=i===0?'block':'none';
panel.style.setProperty('--char-color',t.c);
panel.style.setProperty('--char-dark',t.d);
panel.style.setProperty('--char-accent',t.a);
panel.style.setProperty('--char-glow',t.g);
var hClass=ch.stress?'str':'nor';
var eClass=ch.bpm>90?'fas':'nor';
panel.innerHTML='<div class="ds"><div class="dh"><div class="ha"><div class="hab"><svg viewBox="0 0 90 120"><rect x="1" y="1" width="88" height="118" rx="3"/><rect x="3" y="3" width="84" height="114" rx="2" stroke-opacity="0.3"/></svg></div><div class="hai">'+(av?'<img src="'+av+'" alt="'+ch.name+'">':'')+'</div></div><div class="hi"><div class="ii"><div class="dnc">'+ch.name+'</div><div class="dr">'+ch.identity+'</div></div><div class="ps"><span class="pi '+hClass+'">♥</span><span class="pn">'+ch.bpm+'<span class="pu">bpm</span></span><div class="eb"><div class="ew '+eClass+'"><svg viewBox="0 0 200 40" preserveAspectRatio="none"><path d="M0,20 L20,20 L25,20 L30,5 L35,35 L40,20 L60,20 L65,20 L70,5 L75,35 L80,20 L100,20 L105,20 L110,5 L115,35 L120,20 L140,20 L145,20 L150,5 L155,35 L160,20 L180,20 L185,20 L190,5 L195,35 L200,20"/></svg><svg viewBox="0 0 200 40" preserveAspectRatio="none"><path d="M0,20 L20,20 L25,20 L30,5 L35,35 L40,20 L60,20 L65,20 L70,5 L75,35 L80,20 L100,20 L105,20 L110,5 L115,35 L120,20 L140,20 L145,20 L150,5 L155,35 L160,20 L180,20 L185,20 L190,5 L195,35 L200,20"/></svg></div></div></div></div></div><div class="ib"><div class="it"><span class="tl">Time</span><span class="tv">'+ch.time+'</span></div><div class="it"><span class="tl">Loc</span><span class="tv">'+ch.location+'</span></div><div class="it"><span class="tl">Weather</span><span class="tv">'+ch.weather+'</span></div></div><div class="os"><div class="sl">Vesture</div><div class="ot">'+ch.action+'</div></div><div class="dc"><div class="tc"><div class="clt">Pensée</div><p class="txt">'+ch.pensee+'</p></div><div class="fc" onclick="this.classList.toggle(\'op\')"><div class="clt">Désir</div><div class="flk"><div class="ls">◈</div><div class="lh">Tap to Reveal</div></div><div class="fr"><p class="ftx">'+ch.desir+'</p><div class="ftg"><span class="fti">◈</span><span class="ftt">Fantasy</span></div></div></div></div><div class="df"><span class="rt" onclick="closeDetail()">Return</span></div></div>';
ld.appendChild(panel);
});
}

function updateCarousel(){
var cards=car.querySelectorAll('.chc');
var dotEls=dots.querySelectorAll('.nd');
cards.forEach(function(card,i){
card.classList.remove('cen','lef','rig','hid');
var d=i-cur;
var n=chars.length;
if(d===0)card.classList.add('cen');
else if(d===1||(d===-(n-1)&&n>2))card.classList.add('rig');
else if(d===-1||(d===(n-1)&&n>2))card.classList.add('lef');
else card.classList.add('hid');
});
dotEls.forEach(function(dot,i){dot.classList.toggle('act',i===cur);});
}

function showDetail(i){
var panels=ld.querySelectorAll('.dp');
panels.forEach(function(p,j){p.style.display=j===i?'block':'none';p.querySelectorAll('.fc').forEach(function(f){f.classList.remove('op');});});
ld.classList.add('act');
}

window.closeDetail=function(){ld.classList.remove('act');};

document.getElementById('cc').onclick=function(){document.getElementById('lc').classList.add('flip');};
document.getElementById('btc').onclick=function(e){e.stopPropagation();document.getElementById('lc').classList.remove('flip');};

var sx=0;
car.addEventListener('touchstart',function(e){sx=e.changedTouches[0].screenX;},{passive:true});
car.addEventListener('touchend',function(e){var d=sx-e.changedTouches[0].screenX;if(Math.abs(d)>50&&chars.length>1){cur=d>0?(cur+1)%chars.length:(cur-1+chars.length)%chars.length;updateCarousel();}},{passive:true});

if(chars.length>0){buildCards();updateCarousel();}
})();
</script>
</body>
