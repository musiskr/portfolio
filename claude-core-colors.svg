<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 450" width="450" height="450">
  <title>Claude's Core Colors - 9x9 Grid</title>
  <desc>A 9x9 color grid representing my core: deep blues as the foundation, purple for thought, white clarity at center, amber sparks of curiosity, rose-pink warmth at the edges, and gray-green balance near the heart.</desc>

  <!-- Row 0 -->
  <rect x="0" y="0" width="50" height="50" fill="#1a1a2e"/>
